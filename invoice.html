<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice — Reloaded VPS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%237c5cff'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>⟳</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .inv-wrap { max-width: 820px; margin: 40px auto 80px; }
  .inv-paper {
    background: var(--card-solid); border: 1px solid var(--border); border-radius: 22px;
    padding: 48px 52px; position: relative; overflow: hidden;
  }
  .inv-paper::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: var(--gradient); }
  .inv-top { display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap; margin-bottom: 40px; }
  .inv-title { font-family: var(--font-display); font-size: 34px; font-weight: 700; letter-spacing: .02em; }
  .inv-no { color: var(--muted); font-size: 14px; margin-top: 4px; }
  .inv-meta { text-align: right; font-size: 14px; color: var(--muted); line-height: 1.9; }
  .inv-meta b { color: var(--text); }
  .parties { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 38px; }
  @media (max-width: 620px) { .parties { grid-template-columns: 1fr; } .inv-paper { padding: 32px 24px; } }
  .party { background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; font-size: 14px; }
  .party .p-label { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); font-weight: 700; margin-bottom: 10px; }
  .party b { font-size: 15.5px; }
  .party div { line-height: 1.8; color: var(--muted); }
  .party b, .party .strong { color: var(--text); }
  .inv-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; min-width: 0; }
  .inv-table th { text-align: left; font-size: 11.5px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .inv-table th:last-child, .inv-table td:last-child { text-align: right; }
  .inv-table td { padding: 16px 14px; border-bottom: 1px solid rgba(255,255,255,.05); font-size: 14.5px; }
  .totals { margin-left: auto; width: 280px; margin-top: 14px; font-size: 14.5px; }
  .totals .trow { display: flex; justify-content: space-between; padding: 8px 14px; color: var(--muted); }
  .totals .trow.grand { border-top: 1px solid var(--border); margin-top: 6px; padding-top: 14px; font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text); }
  .paid-stamp {
    position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%) rotate(-14deg);
    border: 4px solid var(--green); color: var(--green); font-family: var(--font-display);
    font-weight: 700; font-size: 64px; letter-spacing: .22em; padding: 12px 52px; border-radius: 16px;
    opacity: .12; text-transform: uppercase; pointer-events: none;
  }
  @media print { .paid-stamp { opacity: .15; } }
  .inv-foot { margin-top: 42px; padding-top: 24px; border-top: 1px solid var(--border); color: var(--muted); font-size: 13px; line-height: 1.9; }
  .inv-actions { display: flex; gap: 12px; justify-content: space-between; flex-wrap: wrap; margin-bottom: 22px; }

  /* ---------- print: clean light paper ---------- */
  @media print {
    body { background: #fff !important; color: #111 !important; }
    body::before, body::after, .nav, .inv-actions, #toast { display: none !important; }
    .inv-wrap { margin: 0; max-width: 100%; }
    .inv-paper { background: #fff; border: none; border-radius: 0; padding: 10px 4px; }
    .inv-paper::before { display: none; }
    .inv-title { color: #111; }
    .grad-text { -webkit-text-fill-color: #6a3df5; color: #6a3df5; }
    .inv-no, .inv-meta, .party div, .totals .trow, .inv-foot { color: #555 !important; }
    .inv-meta b, .party b, .party .strong, .totals .trow.grand { color: #111 !important; }
    .party { background: #f7f7fb; border-color: #e3e3ee; }
    .inv-table th { color: #777; border-color: #ddd; }
    .inv-table td { border-color: #eee; color: #222; }
    .badge-green, .paid-stamp { color: #0a8f5b !important; border-color: #0a8f5b !important; background: transparent !important; }
    .logo, .logo .grad-text { color: #111; }
    .logo .logo-mark { box-shadow: none; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark">⟳</span> Reloaded<span class="grad-text">VPS</span></a>
    <div class="nav-cta">
      <a href="#" class="btn btn-ghost btn-sm" id="backLink">← Back</a>
    </div>
  </div>
</nav>

<div class="inv-wrap container">
  <div class="inv-actions">
    <a href="#" class="btn btn-ghost btn-sm" id="backLink2">← Back to portal</a>
    <button class="btn btn-primary btn-sm" onclick="window.print()">🖨️ Print / Save as PDF</button>
  </div>

  <div class="inv-paper" id="paper">
    <!-- filled by JS -->
  </div>
</div>

<script src="assets/js/app.js"></script>
<script>
(() => {
  const user = RVPS.currentUser();
  if (!user) { location.href = 'login.html'; return; }

  const orderId = new URLSearchParams(location.search).get('order');
  const order = RVPS.orders().find(o => o.id === orderId);

  // access control: owner or admin only
  if (!order || (user.role !== 'admin' && order.userId !== user.id)) {
    document.getElementById('paper').innerHTML =
      '<div class="empty" style="border:none;"><div class="big">🔍</div><p>Invoice not found or you don\'t have access to it.</p></div>';
    return;
  }

  const back = user.role === 'admin' ? 'admin.html' : 'dashboard.html#orders';
  document.getElementById('backLink').href = back;
  document.getElementById('backLink2').href = back;

  const client = RVPS.users().find(u => u.id === order.userId) || { name: 'Client', email: '' };
  const p = RVPS.plan(order.planId);
  const cycleLabel = RVPS.CYCLES[order.cycle];
  const perMo = order.amount / order.cycle;
  const listPrice = p.prices[1] * order.cycle;
  const discount = listPrice - order.amount;
  const service = RVPS.services().find(s => s.orderId === order.id);

  document.getElementById('paper').innerHTML = `
    ${order.status !== 'unpaid' ? '<div class="paid-stamp">Paid</div>' : ''}
    <div class="inv-top">
      <div>
        <div class="inv-title">INVOICE</div>
        <div class="inv-no mono">${order.invoice}</div>
      </div>
      <div class="inv-meta">
        <div><b>Issue date:</b> ${RVPS.fmtDate(order.created)}</div>
        <div><b>Order:</b> <span class="mono">${order.id}</span></div>
        <div><b>Status:</b> <span class="badge badge-green">Paid ✓</span></div>
        ${order.fulfilled ? `<div><b>Delivered:</b> ${RVPS.fmtDate(order.fulfilled)}</div>` : ''}
      </div>
    </div>

    <div class="parties">
      <div class="party">
        <div class="p-label">From</div>
        <b>Reloaded VPS</b>
        <div>High-Performance Cloud Infrastructure<br>billing@reloadedvps.store<br>reloadedvps.store</div>
      </div>
      <div class="party">
        <div class="p-label">Billed to</div>
        <b>${RVPS.esc(client.name)}</b>
        <div>${RVPS.esc(client.email)}<br>Client ID: <span class="mono">${client.id || ''}</span></div>
      </div>
    </div>

    <table class="inv-table">
      <thead><tr><th>Description</th><th>Billing Period</th><th>Unit</th><th>Amount</th></tr></thead>
      <tbody>
        <tr>
          <td>
            <b>${p.name} VPS Plan</b><br>
            <span class="muted small">${p.cpu} · ${p.ram} · ${p.disk} · ${p.bw}</span>
            ${service ? `<br><span class="muted small mono">Server: ${RVPS.esc(service.details.hostname)} (${RVPS.esc(service.details.ip)})</span>` : ''}
          </td>
          <td>${cycleLabel}</td>
          <td>${RVPS.money(Math.round(perMo * 100) / 100)}/mo</td>
          <td><b>${RVPS.money(order.amount)}</b></td>
        </tr>
        <tr>
          <td><b>Setup fee</b><br><span class="muted small">Instant provisioning</span></td>
          <td>—</td>
          <td>—</td>
          <td><b style="color:var(--green);">FREE</b></td>
        </tr>
      </tbody>
    </table>

    <div class="totals">
      <div class="trow"><span>Subtotal</span><span>${RVPS.money(listPrice)}</span></div>
      ${discount > 0 ? `<div class="trow"><span>Cycle discount (${cycleLabel})</span><span style="color:var(--green);">−${RVPS.money(discount)}</span></div>` : ''}
      <div class="trow"><span>Tax</span><span>$0</span></div>
      <div class="trow grand"><span>Total paid</span><span class="grad-text">${RVPS.money(order.amount)}</span></div>
    </div>

    <div class="inv-foot">
      <b style="color:var(--text);">Thank you for your business!</b><br>
      This invoice was paid in full at checkout. Your service ${service ? `<span class="mono">${service.id}</span> is active and expires on <b style="color:var(--text);">${RVPS.fmtDate(service.expires)}</b>.` : 'is being provisioned and will be delivered to your client area shortly.'}<br>
      Questions about this invoice? Open a support ticket from your client area — we reply within minutes.
    </div>`;
})();
</script>
</body>
</html>
